# Default cluster — editorial pipeline
# editor routes dynamically via keyword router
# writer → linguist → human (static chain)

[agents.editor]
router = "editorial_gate"

[agents.writer]
next_agent = "linguist"

[agents.linguist]
next_agent = "human"

[routers.editorial_gate]
type = "keyword"
routes.writer = ["WRITER BRIEF", "END BRIEF"]
default = "human"
